version: "3.8"

services:
  outclaw:
    build: .
    container_name: outclaw
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - outclaw-net

  mysql:
    image: mysql:8.0
    container_name: outclaw-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-outclaw_root_pass}
      MYSQL_DATABASE: ${DB_NAME:-outclaw}
      MYSQL_USER: ${DB_USER:-outclaw}
      MYSQL_PASSWORD: ${DB_PASSWORD:-outclaw_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - outclaw-net

  redis:
    image: redis:7-alpine
    container_name: outclaw-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - outclaw-net

volumes:
  mysql_data:
  redis_data:

networks:
  outclaw-net:
    driver: bridge
